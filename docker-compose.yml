services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-poolantir}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-simulation}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poolantir

  api:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      INFLUX_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG:-poolantir}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-simulation}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - poolantir

  web:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://api:5000
    depends_on:
      - api
    networks:
      - poolantir

volumes:
  influxdb-data:

networks:
  poolantir:
